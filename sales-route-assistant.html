// ============= UTILITIES =============
const fmtDate = (d) => {
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dt = new Date(d);
  return `${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()+543}`.replace(new RegExp(`${dt.getFullYear()+543}`),(dt.getFullYear()+543).toString().slice(-2));
};

function Header({tab, setTab, stats}) {

                ${tab===t.id ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-600 hover:text-slate-900'}`}>
              <Icon name={t.icon} className="w-4 h-4"/>{t.label}
            </button>
          ))}
        </nav>
        <div className="flex items-center gap-3">
          <button className="relative p-2 rounded-lg hover:bg-slate-100">
            <Icon name="bell" className="w-5 h-5 text-slate-600"/>
            <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-rose-500 text-white text-[10px] rounded-full flex items-center justify-center font-semibold">{stats.followsDue}</span>

          <div className="w-9 h-9 rounded-full bg-gradient-to-br from-amber-400 to-pink-500 flex items-center justify-center text-white font-bold text-sm">S</div>
        </div>
      </div>
      <nav className="md:hidden flex items-center gap-1 px-3 pb-3 overflow-x-auto scrollbar-thin">
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap
              ${tab===t.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>
            <Icon name={t.icon} className="w-3.5 h-3.5"/>{t.label}
          </button>
        ))}

    </header>
  );
}

function Dashboard({visits, setTab}) {
  const openTopics = visits.flatMap(v => v.topics.filter(t=>!t.done));
  const openFollows = visits.flatMap(v => v.followUps.filter(f=>!f.done));
  const dueSoon = openFollows.filter(f => daysUntil(f.due) <= 3);
  const overdue = openFollows.filter(f => daysUntil(f.due) < 0);
  const route = TODAY_ROUTE_IDS.map(id => SHOPS.find(s=>s.id===id));

  return (
    <div className="space-y-6">
      {/* Hero */}
      <div className="bg-gradient-to-br from-indigo-600 via-violet-600 to-fuchsia-600 rounded-2xl p-6 text-white relative overflow-hidden">
        <div className="absolute -right-16 -top-16 w-64 h-64 bg-white/10 rounded-full blur-3xl"/>
        <div className="absolute -left-10 -bottom-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"/>
        <div className="relative">
          <div className="flex items-center gap-2 text-white/80 text-sm mb-1">
            <Icon name="calendar" className="w-4 h-4"/>
            วันพุธที่ 22 เมษายน 2569
          </div>
          <h1 className="text-2xl md:text-3xl font-bold mb-1">สวัสดีคุณสายรุ้ง 👋</h1>
          <p className="text-white/90 mb-4">วันนี้มีร้านแนะนำ <b>{route.length} ร้าน</b> • Follow-up ค้าง <b>{openFollows.length} รายการ</b> ({overdue.length} เกินกำหนด)</p>
          <button onClick={()=>setTab('map')} className="bg-white text-indigo-700 px-4 py-2 rounded-lg font-semibold text-sm hover:bg-indigo-50 inline-flex items-center gap-2">
            <Icon name="map" className="w-4 h-4"/>ดูรูทวันนี้
          </button>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <StatCard label="ร้านในระบบ"       value={SHOPS.length}    hint="sync จาก APIfy"   color="indigo"  icon="store"/>
        <StatCard label="Topics ค้าง"       value={openTopics.length} hint="จาก 4 visits ล่าสุด" color="amber"   icon="flag"/>
        <StatCard label="Follow-up ค้าง"    value={openFollows.length} hint={`${dueSoon.length} ใกล้ครบกำหนด`} color="rose" icon="clock"/>
        <StatCard label="เกินกำหนด"         value={overdue.length} hint="ต้องเคลียร์ด่วน"  color="red"     icon="alert"/>
      </div>

      {/* 2col */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* Today's route */}
        <div className="lg:col-span-2 bg-white rounded-2xl p-5 border border-slate-200">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="font-bold text-lg">รูทแนะนำวันนี้</h2>
              <p className="text-xs text-slate-500">AI คำนวณจากระยะทาง + ความ priority + gap ของ last order</p>
            </div>
            <button onClick={()=>setTab('map')} className="text-xs text-indigo-600 font-medium">ดูแผนที่ →</button>
          </div>
          <div className="space-y-2">
            {route.map((s,i) => (
              <div key={s.id} className="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 border border-slate-100">
                <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm">{i+1}</div>
                <div className="text-2xl">{SHOP_TYPES[s.type].icon}</div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate">{s.name}</div>
                  <div className="text-xs text-slate-500">{s.area} • Last order {daysToText(s.gap)}</div>
                </div>
                <span className={`text-[10px] px-2 py-0.5 rounded-full border ${priorityColor(s.priority)}`}>{priorityLabel(s.priority)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Urgent follow-ups */}
        <div className="bg-white rounded-2xl p-5 border border-slate-200">
          <div className="flex items-center gap-2 mb-3">
            <Icon name="alert" className="w-5 h-5 text-rose-600"/>
            <h2 className="font-bold">ต้องเคลียร์ด่วน</h2>
          </div>
          <div className="space-y-3">
            {openFollows.slice(0,5).map(f => {
              const visit = visits.find(v => v.followUps.some(x=>x.id===f.id));
              const shop = SHOPS.find(s => s.id === visit.shopId);
              const du = daysUntil(f.due);
              return (
                <div key={f.id} className="flex gap-3">
                  <div className={`mt-1 w-2 h-2 rounded-full ${du<0?'bg-rose-500 pulse-dot':du<=2?'bg-amber-500':'bg-emerald-500'}`}/>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium truncate">{f.text}</div>
                    <div className="text-xs text-slate-500 flex items-center gap-1 mt-0.5">
                      <span className="truncate">{shop.name}</span>
                      <span>•</span>
                      <span className={du<0?'text-rose-600 font-medium':du<=2?'text-amber-600':''}>
                        {du<0?`เกิน ${-du} วัน`:du===0?'วันนี้':`อีก ${du} วัน`}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

const daysToText = (d) => d<=7?`${d} วันที่แล้ว`:d<=30?`${d} วันที่แล้ว ⚠️`:`${d} วันที่แล้ว 🔴`;

function StatCard({label, value, hint, color, icon}) {
  const colors = {
    indigo:'from-indigo-500 to-blue-500',
    amber:'from-amber-500 to-orange-500',
    rose:'from-rose-500 to-pink-500',
    red:'from-red-600 to-rose-600'
  };
  return (
    <div className="bg-white rounded-2xl p-4 border border-slate-200">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-medium text-slate-500">{label}</span>
        <div className={`w-8 h-8 rounded-lg bg-gradient-to-br ${colors[color]} flex items-center justify-center text-white`}>
          <Icon name={icon} className="w-4 h-4"/>
        </div>
      </div>
      <div className="text-3xl font-bold">{value}</div>
      <div className="text-xs text-slate-500 mt-1">{hint}</div>
    </div>
  );
}

function MapView({visits}) {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  const [selected, setSelected] = useState(null);
  const [filterType, setFilterType] = useState('all');
  const [showRoute, setShowRoute] = useState(true);

  const filtered = filterType==='all' ? SHOPS : SHOPS.filter(s => s.type===filterType);
  const route = TODAY_ROUTE_IDS.map(id => SHOPS.find(s=>s.id===id));

  useEffect(() => {
    if (!mapRef.current || mapInst.current) return;
    mapInst.current = L.map(mapRef.current, {zoomControl:false}).setView([13.7563, 100.5400], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution:'© OpenStreetMap © CARTO', maxZoom:19
    }).addTo(mapInst.current);
    L.control.zoom({position:'topright'}).addTo(mapInst.current);
  }, []);

  useEffect(() => {
    if (!mapInst.current) return;
    mapInst.current.eachLayer(l => { if (l instanceof L.Marker || l instanceof L.Polyline) mapInst.current.removeLayer(l); });

    filtered.forEach(s => {
      const typeInfo = SHOP_TYPES[s.type];
      const inRoute = TODAY_ROUTE_IDS.includes(s.id);
      const icon = L.divIcon({
        className:'',
        html: `<div style="position:relative">
                 <div style="width:${inRoute?40:32}px;height:${inRoute?40:32}px;border-radius:50%;background:${typeInfo.color};
                             display:flex;align-items:center;justify-content:center;color:white;
                             font-size:${inRoute?18:14}px;border:${inRoute?3:2}px solid white;
                             box-shadow:0 2px 8px rgba(0,0,0,0.25)">${typeInfo.icon}</div>
                 ${inRoute?`<div style="position:absolute;top:-6px;right:-6px;background:#4f46e5;color:white;
                              font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;
                              display:flex;align-items:center;justify-content:center;border:2px solid white">
                              ${TODAY_ROUTE_IDS.indexOf(s.id)+1}</div>`:''}
               </div>`,
        iconSize:[inRoute?40:32, inRoute?40:32],
        iconAnchor:[inRoute?20:16, inRoute?20:16],
      });
      const m = L.marker([s.lat, s.lng], {icon}).addTo(mapInst.current);
      m.on('click', ()=> setSelected(s));
    });

    if (showRoute) {
      const coords = route.map(s=>[s.lat,s.lng]);
      L.polyline(coords, {
        color:'#4f46e5', weight:3, opacity:0.7, dashArray:'6,6', className:'route-line'
      }).addTo(mapInst.current);
    }
  }, [filterType, showRoute]);

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 h-[calc(100vh-140px)]">
      {/* Left panel: route */}
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden flex flex-col">
        <div className="p-4 border-b border-slate-100">
          <div className="flex items-center justify-between mb-3">
            <div>
              <h2 className="font-bold">รูทวันนี้</h2>
              <p className="text-xs text-slate-500">ลำดับที่ AI แนะนำ</p>
            </div>
            <button onClick={()=>setShowRoute(!showRoute)} className={`text-xs px-2 py-1 rounded-lg ${showRoute?'bg-indigo-100 text-indigo-700':'bg-slate-100 text-slate-600'}`}>
              {showRoute?'ซ่อนเส้น':'แสดงเส้น'}
            </button>
          </div>
          <div className="flex gap-1 flex-wrap">
            <Chip active={filterType==='all'} onClick={()=>setFilterType('all')} label="ทั้งหมด" count={SHOPS.length}/>
            {Object.entries(SHOP_TYPES).map(([k,v]) => (
              <Chip key={k} active={filterType===k} onClick={()=>setFilterType(k)}
                label={`${v.icon} ${v.label}`} count={SHOPS.filter(s=>s.type===k).length}/>
            ))}
          </div>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-2">
          {route.map((s,i) => {
            const isSel = selected?.id===s.id;
            return (
              <div key={s.id} onClick={()=>{setSelected(s); mapInst.current.flyTo([s.lat,s.lng],14);}}
                className={`p-3 rounded-xl border cursor-pointer transition
                  ${isSel?'border-indigo-500 bg-indigo-50':'border-slate-200 hover:bg-slate-50'}`}>
                <div className="flex items-start gap-3">
                  <div className="w-7 h-7 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-xs flex-shrink-0">{i+1}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{s.name}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{SHOP_TYPES[s.type].label} • {s.area}</div>
                    <div className="flex items-center gap-2 mt-2">
                      <span className={`text-[10px] px-1.5 py-0.5 rounded border ${priorityColor(s.priority)}`}>
                        {priorityLabel(s.priority)}
                      </span>
                      <span className="text-[10px] text-slate-500">Last {s.gap}d</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          <div className="pt-3 mt-3 border-t border-slate-100">
            <div className="text-xs font-medium text-slate-500 mb-2">ร้านอื่นในละแวก (AI แนะนำเพิ่ม)</div>
            {SHOPS.filter(s=>!TODAY_ROUTE_IDS.includes(s.id)).slice(0,3).map(s => (
              <div key={s.id} onClick={()=>{setSelected(s); mapInst.current.flyTo([s.lat,s.lng],14);}}
                className="flex items-center gap-2 p-2 rounded-lg hover:bg-slate-50 cursor-pointer">
                <span className="text-lg">{SHOP_TYPES[s.type].icon}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-medium truncate">{s.name}</div>
                  <div className="text-[10px] text-slate-500">{s.area}</div>
                </div>
                <button className="text-[10px] bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md">+ เพิ่ม</button>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Center map */}
      <div className="lg:col-span-2 bg-white rounded-2xl border border-slate-200 overflow-hidden relative">
        <div ref={mapRef} className="w-full h-full"/>
        {/* Floating legend */}
        <div className="absolute top-3 left-3 bg-white/95 backdrop-blur rounded-xl p-3 shadow-md">
          <div className="text-[10px] font-semibold text-slate-500 mb-2 uppercase tracking-wide">ประเภทร้าน</div>
          <div className="space-y-1.5">
            {Object.entries(SHOP_TYPES).map(([k,v])=>(
              <div key={k} className="flex items-center gap-2 text-xs">
                <div className="w-4 h-4 rounded-full" style={{background:v.color}}/>
                <span>{v.icon} {v.label}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Sync status */}
        <div className="absolute top-3 right-3 md:right-14 bg-white/95 backdrop-blur rounded-xl px-3 py-2 shadow-md flex items-center gap-2 text-xs">
          <div className="w-2 h-2 bg-emerald-500 rounded-full pulse-dot"/>
          <span className="font-medium">APIfy synced</span>
          <span className="text-slate-400">• 5 นาทีที่แล้ว</span>
        </div>

        {selected && (
          <div className="absolute bottom-3 left-3 right-3 bg-white rounded-xl shadow-lg border border-slate-200 p-4 max-w-md">
            <div className="flex items-start justify-between mb-2">
              <div className="flex items-center gap-2">
                <span className="text-2xl">{SHOP_TYPES[selected.type].icon}</span>
                <div>
                  <div className="font-bold">{selected.name}</div>
                  <div className="text-xs text-slate-500">{SHOP_TYPES[selected.type].label} • {selected.area}</div>
                </div>
              </div>
              <button onClick={()=>setSelected(null)} className="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <div className="grid grid-cols-3 gap-2 my-3 text-xs">
              <div className="bg-slate-50 rounded p-2">
                <div className="text-slate-500">Last order</div>
                <div className="font-semibold">{selected.gap} วัน</div>
              </div>
              <div className="bg-slate-50 rounded p-2">
                <div className="text-slate-500">Priority</div>
                <div className="font-semibold">{priorityLabel(selected.priority)}</div>
              </div>
              <div className="bg-slate-50 rounded p-2">
                <div className="text-slate-500">Visits</div>
                <div className="font-semibold">{visits.filter(v=>v.shopId===selected.id).length} ครั้ง</div>
              </div>
            </div>
            <div className="flex gap-2">
              <button className="flex-1 bg-indigo-600 text-white text-sm py-2 rounded-lg font-medium hover:bg-indigo-700 flex items-center justify-center gap-2">
                <Icon name="plus" className="w-4 h-4"/>บันทึก Visit
              </button>
              <button className="px-3 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">
                <Icon name="phone" className="w-4 h-4"/>
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Chip({active, onClick, label, count}) {
  return (
    <button onClick={onClick}
      className={`text-[10px] px-2 py-1 rounded-full border transition
        ${active?'bg-indigo-600 text-white border-indigo-600':'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
      {label} <span className={active?'opacity-80':'text-slate-400'}>({count})</span>
    </button>
  );
}

function Visits({visits, setVisits}) {
  const [selected, setSelected] = useState(visits[0]?.id);
  const [showNew, setShowNew] = useState(false);
  const active = visits.find(v => v.id===selected);
  const shop = active ? SHOPS.find(s=>s.id===active.shopId) : null;

  const toggleTopic = (tid) => setVisits(visits.map(v => v.id===selected
    ? {...v, topics: v.topics.map(t => t.id===tid?{...t, done:!t.done}:t)}:v));
  const toggleFollow = (fid) => setVisits(visits.map(v => v.id===selected
    ? {...v, followUps: v.followUps.map(f => f.id===fid?{...f, done:!f.done}:f)}:v));

  const [newTopic, setNewTopic] = useState('');
  const [newFollow, setNewFollow] = useState('');
  const [newFollowDue, setNewFollowDue] = useState('2026-04-30');

  const addTopic = () => {
    if (!newTopic.trim()) return;
    const id = 't'+Date.now();
    setVisits(visits.map(v=>v.id===selected?{...v, topics:[...v.topics, {id, text:newTopic, done:false, priority:'medium'}]}:v));
    setNewTopic('');
  };
  const addFollow = () => {
    if (!newFollow.trim()) return;
    const id = 'f'+Date.now();
    setVisits(visits.map(v=>v.id===selected?{...v, followUps:[...v.followUps, {id, text:newFollow, due:newFollowDue, done:false}]}:v));
    setNewFollow('');
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      {/* Visit list */}
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div className="p-4 border-b border-slate-100 flex items-center justify-between">
          <div>
            <h2 className="font-bold">Visit ล่าสุด</h2>
            <p className="text-xs text-slate-500">{visits.length} การเข้าร้าน</p>
          </div>
          <button onClick={()=>setShowNew(true)} className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-indigo-700">
            <Icon name="plus" className="w-3.5 h-3.5"/>เพิ่ม
          </button>
        </div>
        <div className="divide-y divide-slate-100 max-h-[600px] overflow-y-auto scrollbar-thin">
          {visits.map(v => {
            const s = SHOPS.find(x=>x.id===v.shopId);
            const openT = v.topics.filter(t=>!t.done).length;
            const openF = v.followUps.filter(f=>!f.done).length;
            const isActive = selected===v.id;
            return (
              <div key={v.id} onClick={()=>setSelected(v.id)}
                className={`p-4 cursor-pointer transition ${isActive?'bg-indigo-50 border-l-4 border-l-indigo-600':'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                <div className="flex items-start gap-2 mb-1">
                  <span className="text-lg">{SHOP_TYPES[s.type].icon}</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{s.name}</div>
                    <div className="text-xs text-slate-500">{fmtDate(v.date)}</div>
                  </div>
                </div>
                <div className="flex gap-2 mt-2 text-[10px]">
                  {openT>0 && <span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">📌 {openT} topics</span>}
                  {openF>0 && <span className="bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full">⏰ {openF} follow</span>}
                  {openT===0 && openF===0 && <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">✓ เคลียร์แล้ว</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Visit detail */}
      {active && (
        <div className="lg:col-span-2 space-y-4">
          {/* Shop header */}
          <div className="bg-white rounded-2xl border border-slate-200 p-5">
            <div className="flex items-start justify-between mb-3">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                     style={{background:SHOP_TYPES[shop.type].color+'20', color:SHOP_TYPES[shop.type].color}}>
                  {SHOP_TYPES[shop.type].icon}
                </div>
                <div>
                  <div className="font-bold text-lg">{shop.name}</div>
                  <div className="text-xs text-slate-500">{SHOP_TYPES[shop.type].label} • {shop.area} • เข้าเมื่อ {fmtDate(active.date)}</div>
                </div>
              </div>
              <button className="text-xs border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-50">แก้ไข</button>
            </div>
            <div className="bg-slate-50 rounded-lg p-3 text-sm text-slate-700">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-1">โน้ตการเยี่ยม</div>
              {active.note}
            </div>
          </div>

          {/* Topics */}
          <div className="bg-white rounded-2xl border border-slate-200 p-5">
            <div className="flex items-center justify-between mb-3">
              <div>
                <h3 className="font-bold flex items-center gap-2">
                  <Icon name="flag" className="w-4 h-4 text-amber-600"/>
                  Topics ({active.topics.filter(t=>!t.done).length} ค้าง / {active.topics.length} ทั้งหมด)
                </h3>
                <p className="text-xs text-slate-500">หัวข้อที่คุยในการเยี่ยมครั้งนี้</p>
              </div>
            </div>
            <div className="space-y-2 mb-3">
              {active.topics.map(t => (
                <div key={t.id} className={`flex items-start gap-3 p-3 rounded-lg border ${t.done?'bg-slate-50 border-slate-100':'border-slate-200'}`}>
                  <button onClick={()=>toggleTopic(t.id)}
                    className={`mt-0.5 w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0
                      ${t.done?'bg-emerald-500 border-emerald-500 text-white':'border-slate-300 hover:border-indigo-500'}`}>
                    {t.done && <Icon name="check" className="w-3 h-3"/>}
                  </button>
                  <div className="flex-1">
                    <div className={`text-sm ${t.done?'line-through text-slate-400':''}`}>{t.text}</div>
                  </div>
                  <span className={`text-[10px] px-2 py-0.5 rounded border ${priorityColor(t.priority)}`}>{priorityLabel(t.priority)}</span>
                </div>
              ))}
            </div>
            <div className="flex gap-2">
              <input value={newTopic} onChange={e=>setNewTopic(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTopic()}
                placeholder="เพิ่ม topic..." className="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500"/>
              <button onClick={addTopic} className="bg-indigo-600 text-white text-sm px-4 rounded-lg hover:bg-indigo-700">เพิ่ม</button>
            </div>
          </div>

          {/* Follow-ups */}
          <div className="bg-white rounded-2xl border border-slate-200 p-5">
            <div className="flex items-center justify-between mb-3">
              <div>
                <h3 className="font-bold flex items-center gap-2">
                  <Icon name="clock" className="w-4 h-4 text-rose-600"/>
                  Follow-ups ({active.followUps.filter(f=>!f.done).length} ค้าง / {active.followUps.length} ทั้งหมด)
                </h3>
                <p className="text-xs text-slate-500">สิ่งที่ต้องตามต่อ + วันครบกำหนด</p>
              </div>
            </div>
            <div className="space-y-2 mb-3">
              {active.followUps.map(f => {
                const du = daysUntil(f.due);
                return (
                  <div key={f.id} className={`flex items-start gap-3 p-3 rounded-lg border ${f.done?'bg-slate-50 border-slate-100':'border-slate-200'}`}>
                    <button onClick={()=>toggleFollow(f.id)}
                      className={`mt-0.5 w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0
                        ${f.done?'bg-emerald-500 border-emerald-500 text-white':'border-slate-300 hover:border-indigo-500'}`}>
                      {f.done && <Icon name="check" className="w-3 h-3"/>}
                    </button>
                    <div className="flex-1">
                      <div className={`text-sm ${f.done?'line-through text-slate-400':''}`}>{f.text}</div>
                      <div className="text-xs text-slate-500 mt-1 flex items-center gap-2">
                        <Icon name="calendar" className="w-3 h-3"/>
                        {fmtDate(f.due)}
                        {!f.done && <span className={du<0?'text-rose-600 font-medium':du<=2?'text-amber-600 font-medium':''}>
                          • {du<0?`เกิน ${-du} วัน`:du===0?'วันนี้':`อีก ${du} วัน`}
                        </span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="flex gap-2">
              <input value={newFollow} onChange={e=>setNewFollow(e.target.value)}
                placeholder="เพิ่ม follow-up..." className="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500"/>
              <input type="date" value={newFollowDue} onChange={e=>setNewFollowDue(e.target.value)}
                className="text-sm border border-slate-200 rounded-lg px-3 py-2"/>
              <button onClick={addFollow} className="bg-indigo-600 text-white text-sm px-4 rounded-lg hover:bg-indigo-700">เพิ่ม</button>
            </div>
          </div>
        </div>
      )}

      {showNew && <NewVisitModal onClose={()=>setShowNew(false)} onAdd={(visit)=>{setVisits([visit, ...visits]); setShowNew(false); setSelected(visit.id);}}/>}
    </div>
  );
}

  const [date, setDate] = useState('2026-04-22');
  const [note, setNote] = useState('');
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="bg-white rounded-2xl w-full max-w-md p-6">
        <h3 className="font-bold text-lg mb-4">บันทึก Visit ใหม่</h3>
        <div className="space-y-3">
          <div>
            <label className="text-xs font-medium text-slate-600 block mb-1">ร้าน</label>
            <select value={shopId} onChange={e=>setShopId(Number(e.target.value))}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
              {SHOPS.map(s => <option key={s.id} value={s.id}>{SHOP_TYPES[s.type].icon} {s.name}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs font-medium text-slate-600 block mb-1">วันที่</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"/>
          </div>
          <div>
            <label className="text-xs font-medium text-slate-600 block mb-1">โน้ตการเยี่ยม</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"/>
          </div>
        </div>
        <div className="flex gap-2 mt-4">
          <button onClick={onClose} className="flex-1 border border-slate-200 py-2 rounded-lg text-sm">ยกเลิก</button>
          <button onClick={()=>onAdd({id:Date.now(), shopId, date, topics:[], followUps:[], note})}
            className="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm hover:bg-indigo-700">บันทึก</button>
        </div>
      </div>
    </div>
  );
}

            const pct = (count / (total*2))*100;

function MiniStat({label, value, delta}) {
  return (
    <div className="bg-white/15 backdrop-blur rounded-xl p-3 border border-white/10">
      <div className="text-xs opacity-80">{label}</div>
      <div className="text-2xl font-bold">{value}</div>
      <div className="text-[10px] opacity-80">{delta}</div>
    </div>
  );
}

function InsightCard({type, title, body, action}) {
  const styles = {
    alert:       {bg:'bg-rose-50',    border:'border-rose-200',    text:'text-rose-700',    tag:'ด่วน',     tagBg:'bg-rose-600'},
    opportunity: {bg:'bg-emerald-50', border:'border-emerald-200', text:'text-emerald-700', tag:'โอกาส',    tagBg:'bg-emerald-600'},
    route:       {bg:'bg-indigo-50',  border:'border-indigo-200',  text:'text-indigo-700',  tag:'รูท',      tagBg:'bg-indigo-600'},
    pattern:     {bg:'bg-amber-50',   border:'border-amber-200',   text:'text-amber-700',   tag:'Pattern', tagBg:'bg-amber-600'},
  }[type];
  return (
    <div className={`${styles.bg} ${styles.border} border rounded-xl p-4`}>
      <div className="flex items-start justify-between gap-2 mb-2">
        <h4 className={`font-bold text-sm ${styles.text}`}>{title}</h4>
        <span className={`${styles.tagBg} text-white text-[10px] px-2 py-0.5 rounded-full font-medium flex-shrink-0`}>{styles.tag}</span>
      </div>
      <p className="text-sm text-slate-700 mb-3">{body}</p>

}

function LegendDot({color, label}) {

// ============= APP =============
function App() {
  const [tab, setTab] = useState('dashboard');
  const [visits, setVisits] = useState(INIT_VISITS);

  const stats = useMemo(() => {
    const openFollows = visits.flatMap(v => v.followUps.filter(f=>!f.done));
    return {followsDue: openFollows.filter(f => daysUntil(f.due)<=3).length};
  }, [visits]);

  return (
    <div className="min-h-screen">
      <Header tab={tab} setTab={setTab} stats={stats}/>
      <main className="max-w-7xl mx-auto px-4 md:px-6 py-6">
        {tab==='dashboard' && <Dashboard visits={visits} setTab={setTab}/>}
        {tab==='map'       && <MapView visits={visits}/>}
        {tab==='visits'    && <Visits visits={visits} setVisits={setVisits}/>}
        {tab==='insights'  && <Insights visits={visits}/>}
        {tab==='email'     && <EmailPreview visits={visits}/>}
      </main>
      <footer className="max-w-7xl mx-auto px-6 py-4 text-center text-xs text-slate-400 border-t border-slate-100 mt-8">
        Prototype • AI Sales Route & Follow-up Assistant • sync กับ APIfy + AI Sales Radar
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
